<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Consulta de Refeições</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background:#f1f3f4;
  padding:12px;
}
.header-title {
  background:#1a73e8;
  color:#fff;
  text-align:center;
  padding:14px;
  border-radius:14px;
  margin-bottom:16px;
  font-weight:700;
}
.logout-btn {
  background:#dc3545;
  color:#fff;
  border:none;
}
.logout-btn:hover {
  background:#bb2d3b;
}
.evento {
  background:#89109b;
  color:#fff;
  font-size:11px;
  padding:4px;
  border-radius:4px;
  cursor:pointer;
}
.dia {
  background:#fff;
  border:1px solid #dee2e6;
  border-radius:6px;
  min-height:90px;
  position:relative;
}
.dia-num {
  position:absolute;
  top:4px;
  right:6px;
  font-size:11px;
  font-weight:600;
}
.calendario {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}
</style>
</head>

<body>

<div class="container">

  <div class="d-flex justify-content-between mb-3">
    <div class="d-flex gap-2">
      <a href="https://coec-epb.github.io/prestacao_de_contas/" class="btn btn-primary">⬅️ Voltar</a>
      <a href="https://coec-epb.github.io/administrador/" class="btn btn-dark">🔐 Administração</a>
    </div>
    <button class="btn logout-btn" onclick="logout()">🚪 Sair</button>
  </div>

  <div class="header-title">📅 Consulta de Refeições</div>

  <div class="card p-3 mb-3">
    <div class="row g-2">
      <div class="col-md-4">
        <label>Matrícula</label>
        <input id="matricula" class="form-control" readonly>
      </div>
      <div class="col-md-3">
        <label>Mês</label>
        <select id="mes" class="form-select"></select>
      </div>
      <div class="col-md-3">
        <label>Ano</label>
        <select id="ano" class="form-select"></select>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="buscar()">Buscar</button>
      </div>
    </div>
  </div>

  <div class="card p-3 mb-3">
    <div class="fw-bold">Total no mês</div>
    <div id="totalMes" class="fs-3 fw-bold">0</div>
    <div id="resumoTipos" class="mt-2"></div>
  </div>

  <div class="card p-3">
    <div id="tituloMes" class="fw-bold mb-3"></div>
    <div id="calendario" class="calendario"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ================= AUTH BASE ================= */
const BASE_URL = "https://long-hall-0aaa.pedro-fillype.workers.dev";
let memoryToken = null;

function getToken(){
  return memoryToken
    || localStorage.getItem("token")
    || sessionStorage.getItem("token");
}

function clearSession(){
  localStorage.removeItem("token");
  localStorage.removeItem("usuarioLogado");
  localStorage.removeItem("matricula");
  sessionStorage.clear();
  memoryToken = null;
}

function apiFetch(url, options = {}){
  const token = getToken();
  const headers = new Headers(options.headers || {});
  if (token) headers.set("Authorization", `Bearer ${token}`);
  return fetch(url, { ...options, headers });
}

async function checkAuthOrRedirect(){
  const token = getToken();
  if (!token){
    location.href = "https://coec-epb.github.io/login/";
    return null;
  }

  const resp = await apiFetch(`${BASE_URL}/me`);
  if (!resp || resp.status === 401){
    clearSession();
    location.href = "https://coec-epb.github.io/login/";
    return null;
  }

  const data = await resp.json();
  if (!data.ok || !data.user){
    clearSession();
    location.href = "https://coec-epb.github.io/login/";
    return null;
  }

  localStorage.setItem("matricula", data.user.matricula);
  document.getElementById("matricula").value = data.user.matricula;

  return data.user;
}

/* ================= LOGOUT ================= */
async function logout(){
  try { await apiFetch(`${BASE_URL}/logout`, { method:"POST" }); } catch {}
  clearSession();
  location.href = "https://coec-epb.github.io/login/";
}

/* ================= INIT ================= */
const meses = ["01","02","03","04","05","06","07","08","09","10","11","12"];
const mesesNome = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

document.addEventListener("DOMContentLoaded", async () => {
  const user = await checkAuthOrRedirect();
  if (!user) return;

  const mesSel = document.getElementById("mes");
  const anoSel = document.getElementById("ano");

  meses.forEach((m,i)=> {
    mesSel.innerHTML += `<option value="${m}">${mesesNome[i]}</option>`;
  });

  const anoAtual = new Date().getFullYear();
  for (let a = anoAtual; a >= anoAtual-5; a--){
    anoSel.innerHTML += `<option value="${a}">${a}</option>`;
  }

  mesSel.value = String(new Date().getMonth()+1).padStart(2,"0");
  anoSel.value = anoAtual;

  buscar();
});

/* ================= BUSCAR ================= */
let dadosMes = [];

async function buscar(){
  const matricula = document.getElementById("matricula").value;
  const mes = document.getElementById("mes").value;
  const ano = document.getElementById("ano").value;

  const resp = await apiFetch(`${BASE_URL}/buscar?matricula=${matricula}&mes=${mes}&ano=${ano}`);
  if (!resp){
    alert("Erro ao buscar dados");
    return;
  }

  dadosMes = await resp.json();
  document.getElementById("tituloMes").innerText = `${mesesNome[Number(mes)-1]} / ${ano}`;

  atualizarResumo();
  montarCalendario();
}

/* ================= RESUMO ================= */
function atualizarResumo(){
  document.getElementById("totalMes").innerText = dadosMes.length;
}

/* ================= CALENDÁRIO ================= */
function montarCalendario(){
  const cal = document.getElementById("calendario");
  cal.innerHTML = "";

  dadosMes.forEach(r => {
    const d = Number(r.datauso.split("-")[2]);
    const div = document.createElement("div");
    div.className = "dia";
    div.innerHTML = `<div class="dia-num">${d}</div><div class="evento">${r.tiporefeicao}</div>`;
    cal.appendChild(div);
  });
}
</script>
</body>
</html>
